# EME permission prompt
# LOCALIZATION NOTE (eme.siteprompt2): %S is hostname
# (eme.siteprompt2 matches A-C's mozac_feature_sitepermissions_media_key_system_access_title string:
# https://searchfox.org/firefox-main/rev/e28b34ab/mobile/android/android-components/components/feature/sitepermissions/src/main/res/values/strings.xml#55)
eme.siteprompt2=Allow %S to play DRM-controlled content?
eme.block=Block
eme.block.accesskey=B
eme.allow2=Allow
eme.allow2.accesskey=A
eme.remember2=Remember this decision

# WebGL permission prompt
# LOCALIZATION NOTE (webgl.siteprompt2): %S is hostname
webgl.siteprompt2=Allow %S to create a WebGL context?
webgl.siteprompt2.warning=This may be used to uniquely identify your computer.
webgl.block=Block
webgl.block.accesskey=B
webgl.allow2=Allow
webgl.allow2.accesskey=A
webgl.remember2=Remember this decision
